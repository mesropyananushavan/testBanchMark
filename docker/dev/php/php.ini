memory_limit=512M
max_execution_time=60
max_input_vars=3000
upload_max_filesize=50M
post_max_size=50M

display_errors=Off
display_startup_errors=Off
error_reporting=E_ALL
log_errors=On
error_log=/proc/self/fd/2

variables_order=EGPCS
date.timezone=UTC
realpath_cache_size=4096K
realpath_cache_ttl=600

expose_php=Off
cgi.fix_pathinfo=0
