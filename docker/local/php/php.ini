memory_limit=1024M
max_execution_time=120
max_input_vars=5000
upload_max_filesize=100M
post_max_size=100M

display_errors=On
display_startup_errors=On
error_reporting=E_ALL
log_errors=On
error_log=/proc/self/fd/2

variables_order=EGPCS
date.timezone=UTC
realpath_cache_size=4096K
realpath_cache_ttl=600

expose_php=Off
cgi.fix_pathinfo=0
