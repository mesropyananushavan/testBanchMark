x-app-build: &app-build
  context: .
  dockerfile: docker/base/php-fpm/Dockerfile
  args:
    APP_ENV: ${APP_ENV:-production}

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-laravel-env: &laravel-env
  APP_ENV: ${APP_ENV:?APP_ENV is required}
  APP_DEBUG: ${APP_DEBUG:-false}
  APP_KEY: ${APP_KEY:-}
  APP_URL: ${APP_URL:-http://localhost}
  LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  DB_CONNECTION: mysql
  DB_HOST: db
  DB_PORT: 3306
  DB_DATABASE: ${DB_DATABASE:?DB_DATABASE is required}
  DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
  DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  CACHE_STORE: ${CACHE_STORE:-redis}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
  SESSION_DRIVER: ${SESSION_DRIVER:-redis}
  L5_SWAGGER_GENERATE_ALWAYS: ${L5_SWAGGER_GENERATE_ALWAYS:-false}
  L5_SWAGGER_CONST_HOST: ${L5_SWAGGER_CONST_HOST:-}
  L5_SWAGGER_BASE_PATH: ${L5_SWAGGER_BASE_PATH:-/api}
  L5_SWAGGER_UI_DARK_MODE: ${L5_SWAGGER_UI_DARK_MODE:-true}

x-laravel-service: &laravel-service
  build: *app-build
  image: laravel-app:${APP_IMAGE_TAG:-latest}
  working_dir: /var/www/html
  init: true
  restart: unless-stopped
  stop_grace_period: 30s
  environment: *laravel-env
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - backend
  logging: *default-logging

services:
  app:
    <<: *laravel-service
    healthcheck:
      test: ["CMD", "php", "/usr/local/bin/healthcheck.php", "app"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  workspace:
    <<: *laravel-service
    entrypoint: ["/usr/local/bin/entrypoint-cli.sh"]
    command: ["sleep", "infinity"]
    stdin_open: true
    tty: true
    restart: "no"

  queue:
    <<: *laravel-service
    entrypoint: ["/usr/local/bin/entrypoint-cli.sh"]
    command:
      - php
      - artisan
      - queue:work
      - --sleep=1
      - --tries=3
      - --timeout=90
      - --max-time=3600
      - --memory=256
      - --no-interaction
    healthcheck:
      test: ["CMD", "php", "/usr/local/bin/healthcheck.php", "queue"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  scheduler:
    <<: *laravel-service
    entrypoint: ["/usr/local/bin/entrypoint-cli.sh"]
    command: ["php", "artisan", "schedule:work", "--no-interaction"]
    healthcheck:
      test: ["CMD", "php", "/usr/local/bin/healthcheck.php", "scheduler"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:1.27.4-alpine
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 10s
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./docker/base/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backend
    logging: *default-logging

  db:
    image: mysql:8.4.6
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-name-resolve
      - --innodb-buffer-pool-size=256M
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:?DB_DATABASE is required}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
      MYSQL_USER: ${DB_USERNAME:?DB_USERNAME is required}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend
    logging: *default-logging

  redis:
    image: redis:7.4.2-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000", "--loglevel", "warning"]
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - backend
    logging: *default-logging

volumes:
  db_data:
  redis_data:

networks:
  backend:
    driver: bridge
